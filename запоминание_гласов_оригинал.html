<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренажер Православных Тропарей</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper: #f4f1ea;
            --ink: #2c2925;
            --church-red: #8b0000;
            --gold: #c5a059;
            --border-style: 2px solid var(--gold);
        }

        body {
            font-family: 'EB Garamond', serif;
            background-color: #dcd7cc;
            background-image: url("https://www.transparenttextures.com/patterns/paper-fibers.png");
            color: var(--ink);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            background-color: var(--church-red);
            color: var(--paper);
            width: 100%;
            text-align: center;
            padding: 30px 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border-bottom: 4px double var(--gold);
        }

        h1 { margin: 0; font-weight: 700; font-size: 2rem; letter-spacing: 1px; }
        h2 { color: var(--church-red); font-variant: small-caps; }

        .container {
            max-width: 900px;
            width: 95%;
            margin: 20px auto;
            text-align: center;
        }

        .card {
            background-color: var(--paper);
            padding: 40px;
            border-radius: 2px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: 1px solid var(--gold);
            position: relative;
            min-height: 400px;
        }

        /* Декоративные уголки */
        .card::before {
            content: "☦";
            position: absolute;
            top: 10px;
            left: 10px;
            color: var(--gold);
            font-size: 1.2rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        button {
            background-color: var(--paper);
            color: var(--church-red);
            border: 1px solid var(--church-red);
            padding: 12px 20px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'EB Garamond', serif;
            font-weight: bold;
        }

        button:hover {
            background-color: var(--church-red);
            color: white;
        }

        .btn-main {
            font-size: 1.4rem;
            padding: 20px;
            border: 2px solid var(--church-red);
        }

        .tropar-text {
            font-size: 1.6rem;
            line-height: 1.6;
            text-align: center;
            margin: 30px 0;
            padding: 20px;
            border-top: 1px solid #eee;
            min-height: 200px;
            word-wrap: break-word;
        }

        .hidden-word {
            display: inline-block;
            color: transparent;
            border-bottom: 2px solid var(--gold);
            margin: 0 2px;
            user-select: none;
        }

        .first-letter {
            color: var(--church-red);
            font-weight: bold;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            background: #eee;
            padding: 15px;
            border-radius: 5px;
        }

        .audio-section {
            margin: 20px 0;
        }

        audio {
            width: 100%;
            max-width: 400px;
            filter: sepia(20%) contrast(90%);
        }

        .hidden { display: none; }
        
        .back-link {
            display: block;
            margin-top: 20px;
            text-decoration: underline;
            cursor: pointer;
            color: var(--church-red);
        }

        @media (max-width: 600px) {
            .tropar-text { font-size: 1.2rem; }
            h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<header>
    <h1>Тренажер Церковного Пения</h1>
</header>

<div class="container">
    
    <!-- MAIN SCREEN -->
    <div id="screen-main" class="screen">
        <div class="card">
            <h2>Выберите раздел</h2>
            <br>
            <button class="btn-main" onclick="showList('resurrection')">Воскресные Тропари (8 гласов)</button>
            <br><br>
            <button class="btn-main" onclick="showList('feasts')">Двунадесятые Праздники</button>
            <br><br>
            <button onclick="startRandom()">Случайный тропарь</button>
        </div>
    </div>

    <!-- LIST SCREEN -->
    <div id="screen-list" class="screen hidden">
        <div class="card">
            <h2 id="list-title">Список</h2>
            <div id="list-container" class="grid"></div>
            <span class="back-link" onclick="showScreen('main')">← Вернуться в начало</span>
        </div>
    </div>

    <!-- TRAINING SCREEN -->
    <div id="screen-train" class="screen hidden">
        <div class="card">
            <h2 id="tropar-title" style="margin-bottom: 5px;"></h2>
            <div id="tropar-glass" style="font-style: italic; margin-bottom: 20px; color: grey;"></div>
            
            <div class="audio-section">
                <audio id="player" controls src=""></audio>
            </div>

            <div id="text-display" class="tropar-text"></div>

            <div class="controls">
                <button onclick="setLevel(0)">Текст</button>
                <button onclick="setLevel(20)">20%</button>
                <button onclick="setLevel(50)">50%</button>
                <button onclick="setLevel(80)">80%</button>
                <button onclick="setLevel(100)">Начальные буквы</button>
            </div>

            <span class="back-link" onclick="backToList()">← К выбору гласа</span>
        </div>
    </div>
</div>

<script>
// Чтобы музыка работала: вставь ID файлов из Google Drive в кавычки ниже
const audioIds = {
    "v1": "ID_ТУТ", "v2": "ID_ТУТ", "v3": "ID_ТУТ", "v4": "ID_ТУТ", 
    "v5": "ID_ТУТ", "v6": "ID_ТУТ", "v7": "ID_ТУТ", "v8": "ID_ТУТ",
    "f1": "ID_ТУТ", "f2": "ID_ТУТ", "f3": "ID_ТУТ", "f4": "ID_ТУТ",
    "f5": "ID_ТУТ", "f6": "ID_ТУТ", "f7": "ID_ТУТ", "f8": "ID_ТУТ",
    "f9": "ID_ТУТ", "f10": "ID_ТУТ", "f11": "ID_ТУТ", "f12": "ID_ТУТ"
};

const getDriveUrl = (id) => id && id.length > 5 ? `https://docs.google.com/uc?export=download&id=${id}` : "";

const data = {
    resurrection: [
        { title: "Воскресный глас 1", glass: "Глас 1", audio: audioIds.v1, text: "Ка́мени запеча́тану от иуде́й, / и во́ином стрегу́щим Пречи́стое Те́ло Твое́, / воскре́сл еси́ тридне́вный, Спа́се, / да́руяй ми́рови жи́знь. / Сего́ ра́ди Си́лы небе́сныя вопия́ху Ти́, Жизнода́вче: / сла́ва воскресе́нию Твоему́, Христе́, / сла́ва ца́рствию Твоему́, / сла́ва смотре́нию Твоему́, еди́не Человеколю́бче." },
        { title: "Воскресный глас 2", glass: "Глас 2", audio: audioIds.v2, text: "Егда́ снисше́л еси́ к сме́рти, Животе́ Безсме́ртный, / тогда́ а́д умертви́л еси́ блиста́нием Божества́: / егда́ же и уме́ршия от преиспо́дних воскреси́л еси́, / вся́ Си́лы небе́сныя взыва́ху: / Жизнода́вче, Христе́ Бо́же на́ш, сла́ва Тебе́." },
        { title: "Воскресный глас 3", glass: "Глас 3", audio: audioIds.v3, text: "Да веселя́тся небе́сная, / да ра́дуются земна́я, / я́ко сотвори́ держа́ву мы́шцею Свое́ю Госпо́дь, / попра́ сме́ртию сме́ртЬ, пе́рвенец ме́ртвых бы́сть; / из чре́ва а́дова изба́ви на́с, / и подаде́ ми́рови ве́лию ми́лость." },
        { title: "Воскресный глас 4", glass: "Глас 4", audio: audioIds.v4, text: "Све́тлую воскресе́ния про́поведь / от А́нгела уве́деша Госпо́дни учени́цы / и пра́деднее осужде́ние отве́ргша, / апо́столом хва́лящася глаго́лаху: / испрове́ржеся сме́рть, / воскре́се Христо́с Бо́г, / да́руяй ми́рови ве́лию ми́лость." },
        { title: "Воскресный глас 5", glass: "Глас 5", audio: audioIds.v5, text: "Собезнача́льное Сло́во Отцу́ и Ду́хови, / от Де́вы ро́ждшееся на спасе́ние на́ше, / пои́м, ве́рнии, и поклони́мся, / я́ко благоволи́ пло́тию взы́ти на кре́ст, / и сме́ртЬ претерпе́ти, / и воскреси́ти уме́ршия / сла́вным воскресе́нием Свои́м." },
        { title: "Воскресный глас 6", glass: "Глас 6", audio: audioIds.v6, text: "Ангельския си́лы на гро́бе Твое́м, / и стрегу́щии омертве́ша, / и стоя́ше Мари́я во гро́бе, / и́щущи Пречи́стаго Те́ла Твоего́. / Плени́л еси́ а́д, не искуси́вся от него́; / сре́тил еси́ Де́ву, да́руяй живо́т. / Воскресы́й из ме́ртвых, Го́споди, сла́ва Тебе́." },
        { title: "Воскресный глас 7", glass: "Глас 7", audio: audioIds.v7, text: "Разруши́л еси́ Кресто́м Твои́м сме́ртЬ, / отве́рзл еси́ разбо́йнику ра́й, / мироно́сицам пла́ч преложи́л еси́, / и апо́столом пропове́дати повеле́л еси́, / я́ко воскре́сл еси́, Христе́ Бо́же, / да́руяй ми́рови ве́лию ми́лость." },
        { title: "Воскресный глас 8", glass: "Глас 8", audio: audioIds.v8, text: "С высоты́ снисше́л еси́, Благоутро́бне, / погребе́ние прия́л еси́ тридне́вное, / да на́с свободи́ши страсте́й, / Животе́ и воскресе́ние на́ше, Го́споди, сла́ва Тебе́." }
    ],
    feasts: [
        { title: "Рождество Богородицы", glass: "Глас 4", audio: audioIds.f1, text: "Рождество́ Твое́ Богоро́дице Де́во, / ра́дость возвести́ все́й вселе́нней: / из Тебе́ бо возсия́ Со́лнце пра́вды Христо́с Бо́г на́ш, / и разруши́в кля́тву, даде́ благослове́ние, / и упраздни́в сме́ртЬ, дарова́ на́м живо́т ве́чный." },
        { title: "Воздвижение Креста", glass: "Глас 1", audio: audioIds.f2, text: "Спаси́ Го́споди лю́ди Твоя́ / и благослови́ достоя́ние Твое́, / побе́ды на сопроти́вныя да́руя / и Твое́ сохраня́я Кресто́м Твои́м жи́тельство." },
        { title: "Введение во храм", glass: "Глас 4", audio: audioIds.f3, text: "Дне́сь благоволе́ния Бо́жия предображе́ние, / и челове́ков спасе́ния пропове́дание, / в хра́ме Бо́жии я́сно Де́ва явля́ется, / и Христа́ все́м предвозвеща́ет. / То́й и мы́ велегла́сно возопии́м: / ра́дуйся смотре́ния Зижди́телева исполне́ние." },
        { title: "Рождество Христово", glass: "Глас 4", audio: audioIds.f4, text: "Рождество́ Твое́ Христе́ Бо́же на́ш, / возсия́ ми́рови све́т разу́ма: / в не́м бо звезда́м служа́щии, / звездо́ю уча́хуся, / Тебе́ кла́нятися Со́лнцу пра́вды, / и Тебе́ ве́дети с высоты́ Восто́ка: / Го́споди сла́ва Тебе́." },
        { title: "Крещение Господне", glass: "Глас 1", audio: audioIds.f5, text: "Во Иорда́не креща́ющуся Тебе́ Го́споди, / Тро́ическое яви́ся поклоне́ние: / Роди́телев бо гла́с свиде́тельствоваше Тебе́, / возлю́бленнаго Тя́ Сы́на имену́я, / и Ду́х в ви́де голуби́не, / изве́ствоваше словесе́ утвержде́ние. / Явле́йся Христе́ Бо́же, / и ми́р просвеще́й сла́ва Тебе́." },
        { title: "Сретение Господне", glass: "Глас 1", audio: audioIds.f6, text: "Ра́дуйся Благода́тная Богоро́дице Де́во, / из Тебе́ бо возсия́ Со́лнце пра́вды, Христо́с Бо́г на́ш, / просвеща́яй су́щия во тме́. / Весели́ся и ты́, ста́рче пра́ведный, / прие́мый во объя́тия Свободи́теля ду́ш на́ших, / да́рующаго на́м воскресе́ние." },
        { title: "Благовещение", glass: "Глас 4", audio: audioIds.f7, text: "Дне́сь спасе́ния на́шего глави́зна, / и е́же от ве́ка та́инства явле́ние: / Сы́н Бо́жий, Сы́н Де́вы быва́ет, / и Гаврии́л благода́ть благовеству́ет. / Те́мже и мы́ с ни́м Богоро́дице возопии́м: / ра́дуйся, Благода́тная, Госпо́дь с Тобо́ю." },
        { title: "Вход в Иерусалим", glass: "Глас 1", audio: audioIds.f8, text: "О́бщее воскресе́ние, / пре́жде Твоея́ стра́сти уверя́я, / из ме́ртвых воздви́гл еси́ Ла́заря, Христе́ Бо́же. / Те́мже и мы́ я́ко о́троцы побе́ды зна́мения нося́ще, / Тебе́ победи́телю сме́рти вопие́м: / оса́нна в вы́шних, благослове́н Гряды́й во и́мя Госпо́дне." },
        { title: "Вознесение Господне", glass: "Глас 4", audio: audioIds.f9, text: "Возне́слся еси́ во сла́ве, Христе́ Бо́же на́ш, / ра́дость сотвори́вый ученико́м, / обеща́нием Свята́го Ду́ха, / извеще́нным и́м бы́вшим благослове́нием, / я́ко Ты́ еси́ Сы́н Бо́жий, Изба́витель ми́ра." },
        { title: "День Святой Троицы", glass: "Глас 8", audio: audioIds.f10, text: "Благослове́н еси́ Христе́ Бо́же на́ш, / Иже прему́дры ловцы́ явле́й, / низпосла́в и́м Ду́ха Свята́го, / и те́ми уловле́й вселе́нную: / Человеколю́бче сла́ва Тебе́." },
        { title: "Преображение", glass: "Глас 7", audio: audioIds.f11, text: "Преобрази́лся еси́ на горе́, Христе́ Бо́же, / показа́вый ученико́м Твои́м сла́ву Твою́, / я́коже можа́ху: / да возсия́ет и на́м гре́шным све́т Тво́й присносу́щный, / моли́твами Богоро́дицы, Светода́вче сла́ва Тебе́." },
        { title: "Успеніе Богородицы", glass: "Глас 1", audio: audioIds.f12, text: "В рождестве́ де́вство сохрани́ла еси́, / во успе́нии ми́ра не оста́вила еси́ Богоро́дице, / преста́вилася еси́ к животу́, Ма́ти су́щи Живота́: / и моли́твами Твои́ми избавля́еши от сме́рти ду́ши на́ша." }
    ]
};

let currentItem = null;
let currentCategory = '';

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
    document.getElementById('screen-' + id).classList.remove('hidden');
    window.scrollTo(0,0);
}

function showList(cat) {
    currentCategory = cat;
    const container = document.getElementById('list-container');
    const title = document.getElementById('list-title');
    container.innerHTML = '';
    title.innerText = cat === 'resurrection' ? 'Воскресные тропари' : 'Двунадесятые праздники';

    data[cat].forEach(item => {
        const btn = document.createElement('button');
        btn.innerText = item.title;
        btn.onclick = () => startTrain(item);
        container.appendChild(btn);
    });
    showScreen('list');
}

function startTrain(item) {
    currentItem = item;
    document.getElementById('tropar-title').innerText = item.title;
    document.getElementById('tropar-glass').innerText = item.glass;
    const player = document.getElementById('player');
    player.src = getDriveUrl(item.audio);
    player.load();
    setLevel(0);
    showScreen('train');
}

function startRandom() {
    const all = [...data.resurrection, ...data.feasts];
    const item = all[Math.floor(Math.random() * all.length)];
    startTrain(item);
}

function setLevel(lvl) {
    const display = document.getElementById('text-display');
    const text = currentItem.text;
    
    if (lvl === 0) {
        display.innerHTML = text.replace(/\//g, '<br><span style="color:var(--gold)">/</span><br>');
        return;
    }

    // Разбиваем на слова, сохраняя знаки препинания и ударения
    const tokens = text.split(/(\s+)/);
    
    const processed = tokens.map(token => {
        if (token.trim() === '' || token === '/') return token === '/' ? '<br><span style="color:var(--gold)">/</span><br>' : token;
        
        // Очищаем слово от знаков препинания для проверки
        const cleanWord = token.replace(/[.,!?;:]/g, '');
        
        if (lvl === 100) {
            return `<span class="first-letter">${token[0]}</span><span class="hidden-word">${token.substring(1)}</span>`;
        }

        if (Math.random() * 100 < lvl) {
            return `<span class="hidden-word">${token}</span>`;
        }
        return token;
    });

    display.innerHTML = processed.join('');
}

function backToList() {
    document.getElementById('player').pause();
    if (currentCategory) showList(currentCategory);
    else showScreen('main');
}
</script>

</body>
</html>
